<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* サイドバー */
    #sidebar {
      width: 260px;
      background: #0f0f23;
      border-right: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }
    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #e88c4a, #cc6b2c);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      color: white;
      flex-shrink: 0;
    }
    #sidebar-header h1 { font-size: 18px; font-weight: 600; }
    #new-chat-btn {
      margin: 12px;
      padding: 10px;
      background: #1a1a3e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    #new-chat-btn:hover { background: #2a2a4e; }
    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .history-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.2s;
      margin-bottom: 2px;
    }
    .history-item:hover { background: #1a1a3e; color: #e0e0e0; }
    .history-item.active { background: #1a1a3e; color: #e0e0e0; }

    /* メインコンテンツ */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #mobile-header {
      display: none;
      padding: 12px 16px;
      background: #0f0f23;
      border-bottom: 1px solid #2a2a4a;
      align-items: center;
      gap: 10px;
    }
    #menu-btn {
      background: none;
      border: none;
      color: #e0e0e0;
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message { display: flex; gap: 12px; max-width: 100%; }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }
    .avatar.ai { background: linear-gradient(135deg, #e88c4a, #cc6b2c); color: white; }
    .avatar.user { background: #0f3460; color: #e0e0e0; }
    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      max-width: 75%;
      line-height: 1.6;
      font-size: 15px;
    }
    .message.ai .bubble {
      background: #16213e;
      border: 1px solid #0f3460;
      border-top-left-radius: 4px;
    }
    .message.user .bubble {
      background: #0f3460;
      border-top-right-radius: 4px;
    }

    /* 空の状態 */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #555;
    }
    #empty-state .big-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #e88c4a, #cc6b2c);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: bold;
      color: white;
    }
    #empty-state p { font-size: 16px; }

    /* 入力エリア */
    #input-area {
      padding: 16px;
      border-top: 1px solid #2a2a4a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      padding: 12px 16px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      resize: none;
    }
    #input:focus { border-color: #e88c4a; }
    #input::placeholder { color: #555; }
    #send {
      padding: 12px 20px;
      background: linear-gradient(135deg, #e88c4a, #cc6b2c);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    #send:hover { opacity: 0.85; }

    /* タイピングアニメーション */
    .typing { display: flex; gap: 4px; padding: 8px 4px; }
    .typing span {
      width: 8px; height: 8px;
      background: #e88c4a;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    /* オーバーレイ（モバイル用） */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 10;
    }

    /* モバイル対応 */
    @media (max-width: 640px) {
      #sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        z-index: 20;
        transform: translateX(-100%);
      }
      #sidebar.open { transform: translateX(0); }
      #mobile-header { display: flex; }
      #overlay.show { display: block; }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>

  <!-- サイドバー -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="logo">C</div>
      <h1>Claude</h1>
    </div>
    <button id="new-chat-btn">＋ 新しいチャット</button>
    <div id="history-list"></div>
  </div>

  <!-- オーバーレイ -->
  <div id="overlay"></div>

  <!-- メイン -->
  <div id="main">
    <div id="mobile-header">
      <button id="menu-btn">☰</button>
      <div class="logo">C</div>
      <span style="font-weight:600">Claude</span>
    </div>

    <div id="chat-container">
      <div id="empty-state">
        <div class="big-logo">C</div>
        <p>何でも聞いてください</p>
      </div>
    </div>

    <div id="input-area">
      <input id="input" type="text" placeholder="メッセージを入力...">
      <button id="send">送信</button>
    </div>
  </div>

  <script>
    const API_URL = 'REPLACE_API_URL';

    // チャットセッション管理
    let sessions = JSON.parse(localStorage.getItem('sessions') || '[]');
    let currentSessionId = null;

    function getCurrentSession() {
      return sessions.find(s => s.id === currentSessionId);
    }

    function createSession() {
      const session = {
        id: Date.now().toString(),
        title: '新しいチャット',
        history: [],
        createdAt: new Date().toISOString()
      };
      sessions.unshift(session);
      saveSession();
      return session;
    }

    function saveSession() {
      localStorage.setItem('sessions', JSON.stringify(sessions));
      renderHistoryList();
    }

    function renderHistoryList() {
      const list = document.getElementById('history-list');
      list.innerHTML = sessions.map(s => `
        <div class="history-item ${s.id === currentSessionId ? 'active' : ''}"
             onclick="loadSession('${s.id}')">
          ${s.title}
        </div>
      `).join('');
    }

    function loadSession(id) {
      currentSessionId = id;
      const session = getCurrentSession();
      const chat = document.getElementById('chat-container');
      chat.innerHTML = '';

      if (session.history.length === 0) {
        showEmptyState();
      } else {
        session.history.forEach(msg => {
          if (msg.role === 'user') addMessage('user', msg.content);
          if (msg.role === 'assistant') addMessage('ai', msg.content);
        });
      }

      renderHistoryList();
      closeSidebar();
    }

    function showEmptyState() {
      const chat = document.getElementById('chat-container');
      chat.innerHTML = `
        <div id="empty-state">
          <div class="big-logo">C</div>
          <p>何でも聞いてください</p>
        </div>`;
    }

    // サイドバー開閉（モバイル）
    document.getElementById('menu-btn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('show');
    });
    document.getElementById('overlay').addEventListener('click', closeSidebar);
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    // 新しいチャット
    document.getElementById('new-chat-btn').addEventListener('click', () => {
      const session = createSession();
      currentSessionId = session.id;
      showEmptyState();
      renderHistoryList();
      closeSidebar();
    });

    // メッセージ送信
    document.getElementById('send').addEventListener('click', sendMessage);
    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    async function sendMessage() {
      const input = document.getElementById('input');
      const message = input.value.trim();
      if (!message) return;

      // セッションがなければ作成
      if (!currentSessionId) {
        const session = createSession();
        currentSessionId = session.id;
      }

      const session = getCurrentSession();

      // 空の状態を消す
      const emptyState = document.getElementById('empty-state');
      if (emptyState) emptyState.remove();

      session.history.push({ role: 'user', content: message });

      // タイトルを最初のメッセージで設定
      if (session.history.filter(m => m.role === 'user').length === 1) {
        session.title = message.length > 20 ? message.slice(0, 20) + '...' : message;
      }

      addMessage('user', message);
      input.value = '';
      saveSession();

      // タイピングインジケーター
      const chat = document.getElementById('chat-container');
      const typing = document.createElement('div');
      typing.className = 'message ai';
      typing.id = 'typing';
      typing.innerHTML = `
        <div class="avatar ai">C</div>
        <div class="bubble typing">
          <span></span><span></span><span></span>
        </div>`;
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ history: session.history })
        });

        document.getElementById('typing')?.remove();
        const data = await response.json();
        const reply = data.reply;

        session.history.push({ role: 'assistant', content: reply });
        addMessage('ai', reply);
        saveSession();
      } catch (e) {
        document.getElementById('typing')?.remove();
        addMessage('ai', 'エラーが発生しました。もう一度お試しください。');
      }
    }

    function addMessage(role, text) {
      const chat = document.getElementById('chat-container');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="avatar ${role}">${role === 'ai' ? 'C' : 'あ'}</div>
        <div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // 初期化
    renderHistoryList();
    if (sessions.length > 0) {
      currentSessionId = sessions[0].id;
      loadSession(currentSessionId);
    }
  </script>
</body>
</html>
