<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 16px 24px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #e88c4a, #cc6b2c);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      color: white;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #f0f0f0; }
    #chat-container {
      flex: 1;
      width: 100%;
      max-width: 760px;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message { display: flex; gap: 12px; max-width: 100%; }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }
    .avatar.ai {
      background: linear-gradient(135deg, #e88c4a, #cc6b2c);
      color: white;
    }
    .avatar.user {
      background: #0f3460;
      color: #e0e0e0;
    }
    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      max-width: 75%;
      line-height: 1.6;
      font-size: 15px;
    }
    .message.ai .bubble {
      background: #16213e;
      border: 1px solid #0f3460;
      border-top-left-radius: 4px;
    }
    .message.user .bubble {
      background: #0f3460;
      border-top-right-radius: 4px;
    }
    #input-area {
      width: 100%;
      max-width: 760px;
      padding: 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      padding: 12px 16px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      resize: none;
    }
    #input:focus { border-color: #e88c4a; }
    #input::placeholder { color: #666; }
    #send {
      padding: 12px 20px;
      background: linear-gradient(135deg, #e88c4a, #cc6b2c);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    #send:hover { opacity: 0.85; }
    .typing {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: #e88c4a;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">C</div>
    <h1>Claude</h1>
  </header>

  <div id="chat-container"></div>

  <div id="input-area">
    <input id="input" type="text" placeholder="メッセージを入力...">
    <button id="send">送信</button>
  </div>

  <script>
    const API_URL = 'https://9wnooyd48i.execute-api.ap-northeast-1.amazonaws.com/chat';
    let history = [];

    document.getElementById('send').addEventListener('click', sendMessage);
    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    async function sendMessage() {
      const input = document.getElementById('input');
      const chat = document.getElementById('chat-container');
      const message = input.value.trim();
      if (!message) return;

      history.push({ role: 'user', content: message });
      addMessage('user', message);
      input.value = '';

      // タイピングインジケーター
      const typing = document.createElement('div');
      typing.className = 'message ai';
      typing.id = 'typing';
      typing.innerHTML = `
        <div class="avatar ai">C</div>
        <div class="bubble typing">
          <span></span><span></span><span></span>
        </div>`;
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;

      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history: history })
      });

      document.getElementById('typing')?.remove();

      const data = await response.json();
      const reply = data.reply;

      history.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);
    }

    function addMessage(role, text) {
      const chat = document.getElementById('chat-container');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="avatar ${role}">${role === 'ai' ? 'C' : 'あ'}</div>
        <div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
